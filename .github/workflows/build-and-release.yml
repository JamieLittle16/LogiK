name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags e.g. v1.3.1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-universal:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew clean jar
      
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LogiK-jar
        path: build/libs/*.jar

    - name: Create Linux App Image using jpackage
      run: |
        JAR_FILE=$(basename $(ls build/libs/*.jar | head -n 1))
        jpackage --type app-image --dest build/installer --input build/libs --name "Logik Simulator" --main-class uk.ac.cam.jml229.logic.app.GuiMain --main-jar "$JAR_FILE" --icon icon.png
        mv "build/installer/Logik Simulator" "build/installer/logik"
        cp icon.png build/installer/logik/icon.png
        cd build/installer && tar -czf logik-linux.tar.gz logik
        
    - name: Upload Linux Tarball Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LogiK-linux-tar
        path: build/installer/logik-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Build with Gradle
      run: .\gradlew clean jar
      
    - name: Create MSI using jpackage
      run: |
        magick icon.png -resize 256x256 icon.ico
        $JAR_FILE = Get-ChildItem -Path build\libs\*.jar | Select-Object -First 1 -ExpandProperty Name
        jpackage --type msi --dest build\installer --input build\libs --name LogiK --main-class uk.ac.cam.jml229.logic.app.GuiMain --main-jar $JAR_FILE --win-shortcut --win-dir-chooser --icon icon.ico
        
    - name: Upload MSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LogiK-msi
        path: build\installer\*.msi

  release:
    needs: [build-universal, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: LogiK-jar
        path: build/libs/
        
    - name: Download MSI artifact
      uses: actions/download-artifact@v4
      with:
        name: LogiK-msi
        path: build/libs/
        
    - name: Download Linux Tarball artifact
      uses: actions/download-artifact@v4
      with:
        name: LogiK-linux-tar
        path: build/libs/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/libs/*.jar
          build/libs/*.msi
          build/libs/logik-linux.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
